<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>我的收藏</title>
</head>
<body>

<h1>⭐ 我的收藏</h1>

<a href="/">返回首页</a>

<hr>

<ul>

{% for id, feed_name, title, link, published in news_list %}

<li>

<strong>{{ feed_name }}</strong>

<a href="{{ link }}" target="_blank">
{{ title }}
</a>

({{ published }})

<a href="/unfavorite/{{ id }}">
    ❌ 取消收藏
</a>

</li>

{% endfor %}

</ul>

</body>
</html>
