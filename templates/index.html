<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RSS News</title>
</head>
<body>
    <h1>最新新闻</h1>
    <a href="/favorites">⭐ 我的收藏</a>

    <hr>

    <ul>
    {% for id, feed_name, title, link, published, favorite in news_list %}
        <li>
            <strong>{{ feed_name }}</strong>:
            <a href="{{ link }}" target="_blank">{{ title }}</a>
            ({{ published }})
            {% if favorite == 1 %}
                <a href="/unfavorite/{{ id }}"> ❌ 取消收藏 </a>
            {% else %}
                <a href="/favorites/{{ id }}"> ⭐ 收藏 </a>
            {% endif %}
        </li>
    {% endfor %}
    </ul>
</body>
</html>
