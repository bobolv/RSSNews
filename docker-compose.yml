services:
  rssnews:
    build: .
    image: rssnews:local
    container_name: rssnews
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DB_FILE: /data/rss_news.db
      KNOWLEDGE_DIR: /data/knowledge
    volumes:
      - ./data:/data
      - ./knowledge:/data/knowledge
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
